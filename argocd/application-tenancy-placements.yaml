---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenancy-placements
  namespace: openshift-gitops
spec:
  destination:
    namespace: policies
    server: https://kubernetes.default.svc
  project: tenancy-policy
  source:
    path: placements
    repoURL: https://github.com/ngner/tenancy-by-acm-policy.git
    targetRevision: master
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
