---
apiVersion: aaq.kubevirt.io/v1alpha1
kind: ApplicationAwareResourceQuota
metadata:
  name: tenant-vm-resource-quota
  namespace: TENANT-NAMESPACE
spec:
  hard:
    # Max 10 VMs × 8 vCPU × 32Gi each (aggregate across all VMIs in the namespace)
    requests.cpu/vmi: "80"
    requests.memory/vmi: "320Gi"
    limits.cpu/vmi: "80"
    limits.memory/vmi: "320Gi"