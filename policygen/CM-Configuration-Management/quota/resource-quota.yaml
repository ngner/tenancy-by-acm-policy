---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-resource-quota
  namespace: TENANT-NAMESPACE
spec:
  hard:
    # 10 VMs @ 8 vCPU / 32Gi (see AAQ) + ~6 CPU / 12Gi headroom for ~3 non-VMI service pods
    requests.cpu: "86"
    requests.memory: "332Gi"
    pods: "15"
    requests.storage: "2000Gi"
    # StorageClass-specific limits (Storage Tiering)
    # gold-storageclass.storageclass.storage.k8s.io/requests.storage: "5000Gi"
    # silver-storageclass.storageclass.storage.k8s.io/requests.storage: "5000Gi"