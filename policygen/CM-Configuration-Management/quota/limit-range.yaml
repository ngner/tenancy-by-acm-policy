---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limit-range
  namespace: TENANT-NAMESPACE
spec:
  limits:
    # No default/defaultRequest/min — VM launcher pods and service pods must
    # declare their own requests/limits explicitly. Only cap the largest single
    # compute pod (e.g. one VM) to match the intended max VM shape.
    - type: Container
      max:
        cpu: "32"
        memory: "128Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "1Ti"
