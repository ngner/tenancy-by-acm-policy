---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: tenancy-cm-hub
placementBindingDefaults:
  name: binding-tenancy-hub-cm
policyDefaults:
  categories:
    - CM Configuration Management
  controls:
    - Provision Tenant Resources
  namespace: policies
  policySets:
    - tenancy-hub-configuration
  remediationAction: enforce
  severity: high
  standards:
    - Multi-Tenant Isolation
  complianceType: musthave
  consolidateManifests: false

policies:
  # - name: tenancy-hub-admin-network-policy
  ## NOT REQUIRED ON THE HUB
  #   controls:
  #     - Enforce Cross-Tenant Network Deny
  #   manifests:
  #     - path: network-policy/admin-network-policy.yaml
  - name: tenancy-hub-console-perspective-visibility
    controls:
      - Enforce ACM Console Perspective Visibility
    manifests:
      - path: console/policy-console-perspective-rbac.yaml

policySets:
  - name: tenancy-hub-configuration
    description: Hub-side configuration policies including network controls
    placement:
      placementName: policies-placement-hub-clusters
