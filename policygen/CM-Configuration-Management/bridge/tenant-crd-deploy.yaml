---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.dusty-seahorse.io
spec:
  group: dusty-seahorse.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - tn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - adminGroup
                - operatorGroup
              properties:
                displayName:
                  type: string
                owner:
                  type: string
                adminGroup:
                  type: string
                operatorGroup:
                  type: string
                resourceQuota:
                  type: object
                  properties:
                    cpu:
                      type: string
                      default: "86"
                    memory:
                      type: string
                      default: "332Gi"
                    pods:
                      type: string
                      default: "15"
                    storage:
                      type: string
                      default: "2000Gi"
                vmQuota:
                  type: object
                  properties:
                    cpu:
                      type: string
                      default: "80"
                    memory:
                      type: string
                      default: "320Gi"
                limitRange:
                  type: object
                  properties:
                    maxCpu:
                      type: string
                      default: "32"
                    maxMemory:
                      type: string
                      default: "128Gi"
                    maxStorage:
                      type: string
                      default: "1Ti"
                network:
                  type: object
                  properties:
                    udnSubnet:
                      type: string
                    metallb:
                      type: object
                      properties:
                        myASN:
                          type: integer
                          default: 64500
                        peerASN:
                          type: integer
                        peerAddress:
                          type: string
                        vrf:
                          type: string
                        addresses:
                          type: array
                          items:
                            type: string
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Admin Group
          type: string
          jsonPath: .spec.adminGroup
        - name: Operator Group
          type: string
          jsonPath: .spec.operatorGroup
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
