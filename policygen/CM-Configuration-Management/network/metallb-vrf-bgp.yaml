---
apiVersion: metallb.io/v1beta2
kind: BGPPeer
metadata:
  name: tenant-bgp-peer
  namespace: metallb-system
spec:
  myASN: 64500
  peerASN: 64501
  peerAddress: 192.168.1.1
  vrf: tenant-vrf
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: tenant-ip-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.10.0/24
  autoAssign: true
---
apiVersion: metallb.io/v1beta1
kind: BGPAdvertisement
metadata:
  name: tenant-bgp-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - tenant-ip-pool
  peers:
  - tenant-bgp-peer