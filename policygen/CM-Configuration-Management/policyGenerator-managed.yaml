---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-managed-cluster-configuration
placementBindingDefaults:
  name: binding-policies-placement-managed-clusters
policyDefaults:
  categories:
    - CM Configuration Management
  standards:
    - NIST SP 800-53
  controls:
    - CM-6 Configuration Settings
  namespace: policies
  policySets:
    - policyset-managed-configuration
  remediationAction: enforce
  severity: high
  complianceType: mustonlyhave
  consolidateManifests: false

policies:
  # =========================================================================
  # Cluster-wide Tenant Isolation (not per-tenant)
  # =========================================================================
  - name: policy-tenant-isolation-anp
    manifests:
      - path: network-policy/admin-network-policy.yaml

  # =========================================================================
  # All tenants — managed cluster config driven by Tenant CRs replicated
  # from the hub by policy-tenant-bridge-to-managed-clusters(tenancies namespace).
  # To add a tenant, create a Tenant CR in the tenancies namespace on the hub.
  # =========================================================================
  - name: policy-tenant-namespaces
    dependencies:
      - name: policy-tenant-bridge-to-managed-clusters
        namespace: tenancies
        compliance: Compliant
    manifests:
      - path: namespace/namespaces-from-crd.yaml

  - name: policy-tenant-hyperconverged-aaq
    manifests:
      - path: quota/hyperconverged-aaq-enabled.yaml
    complianceType: musthave
    
  - name: policy-tenant-quotas
    dependencies:
      - name: policy-tenant-namespaces
        compliance: Compliant
    manifests:
      - path: quota/quotas-from-crd.yaml


  - name: policy-tenant-network
    dependencies:
      - name: policy-tenant-namespaces
        compliance: Compliant
    manifests:
      - path: network/udn-from-crd.yaml

  - name: policy-tenant-metallb
    dependencies:
      - name: policy-tenant-namespaces
        compliance: Compliant
    manifests:
      - path: metallb/bgp-peer-from-crd.yaml
      - path: metallb/ip-address-pool-from-crd.yaml
      - path: metallb/bgp-advertisement-from-crd.yaml

policySets:
  - name: policyset-managed-configuration
    description: Managed cluster tenant namespace provisioning and configuration
    placement:
      placementName: policies-placement-managed-clusters
