---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-managed-tenancy-configuration
placementBindingDefaults:
  name: binding-managed-tenancy-configuration
policyDefaults:
  categories:
    - CM Configuration Management
  controls:
    - CM-6 Configuration Settings
  namespace: policies
  policySets:
    - tenancy-managed-configuration
  remediationAction: enforce
  severity: high
  standards:
    - NIST SP 800-53
  complianceType: mustonlyhave
  consolidateManifests: false

policies:
  # =========================================================================
  # Cluster-wide Tenant Isolation (not per-tenant)
  # =========================================================================
  - name: policy-tenant-isolation-anp
    manifests:
      - path: network-policy/admin-network-policy.yaml

  # =========================================================================
  # All tenants — managed cluster config driven by Tenant CRs replicated
  # from the hub by policy-tenant-bridge (tenancies namespace).
  # To add a tenant, create a Tenant CR in the tenancies namespace on the hub.
  # =========================================================================
  - name: policy-tenant-managed-config
    dependencies:
      - name: policy-tenant-bridge
        namespace: tenancies
        compliance: Compliant
    consolidateManifests: false
    orderManifests: true
    manifests:
      - path: namespace/namespaces-from-crd.yaml
      - path: quota/quotas-from-crd.yaml
      - path: network/network-from-crd.yaml

policySets:
  - name: tenancy-managed-configuration
    description: Managed cluster tenant namespace provisioning and configuration
    placement:
      placementName: placement-managed-clusters
