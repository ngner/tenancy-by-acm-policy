---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-tenancies-bridge
placementBindingDefaults:
  name: binding-tenancies-bridge
policyDefaults:
  categories:
    - CM Configuration Management
  controls:
    - CM-6 Configuration Settings
  namespace: tenancies
  policySets:
    - tenancy-bridge
  remediationAction: enforce
  severity: high
  standards:
    - NIST SP 800-53
  complianceType: musthave
  consolidateManifests: false

policies:
  # =========================================================================
  # Deploy the Tenant CRD and replicate Tenant CRs to managed clusters.
  # The Policy lives in the tenancies namespace alongside the Tenant CRs
  # so {{hub lookup hub}} can access them without cross-namespace RBAC.
  # =========================================================================
  - name: policy-tenant-bridge
    consolidateManifests: false
    orderManifests: true
    manifests:
      - path: bridge/tenant-crd-deploy.yaml
        complianceType: musthave
      - path: bridge/bridge-tenants.yaml

policySets:
  - name: tenancy-bridge
    description: Deploy Tenant CRD and replicate Tenant CRs from hub to managed clusters
    placement:
      placementName: placement-tenancies-managed-clusters
