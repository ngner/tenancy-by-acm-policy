---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-tenancy-hub-configuration-management
placementBindingDefaults:
  name: placement-hub-clusters
policyDefaults:
  categories:
    - CM Configuration Management
  controls:
    - Tenant Isolation
  namespace: tenancies
  policySets:
    - tenancy-managed-configuration
  remediationAction: enforce
  severity: high
  standards:
    - NIST SP 800-53
  complianceType: mustonlyhave
  consolidateManifests: false

policies:
  - name: policy-tenant-crd-create
    manifests:
    - path: tenancy/tenant-crd.yaml
  - name: policy-tenant-bridge
    manifests:
    - path: tenancy/bridge-tenants.yaml
    dependencies:
      - name: policy-tenant-crd-create

policySets:
  - name: tenancy-hub-configuration-management
    description: Hub-side tenant configuration management
    placement:
      placementName: placement-hub-clusters