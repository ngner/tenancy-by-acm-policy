object-templates-raw: |
  {{- $cm := (lookup "v1" "ConfigMap" "policies" "tenant-registry") }}
  {{- range $tenantName, $tenantYaml := $cm.data }}
  {{- $tenant := $tenantYaml | fromYaml }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: rbac.open-cluster-management.io/v1beta1
      kind: MulticlusterRoleAssignment
      metadata:
        name: customer-{{ $tenantName }}-virt-admin
        namespace: policies
      spec:
        subject:
          kind: Group
          name: {{ $tenant.adminGroup }}
        roleAssignments:
        - name: customer-{{ $tenantName }}-virt-admin-kubevirt
          clusterRole: kubevirt.io:admin
          targetNamespaces:
          - {{ $tenantName }}
          clusterSelection:
            type: placements
            placements:
            - name: placement-managed-clusters
              namespace: policies
        - name: customer-{{ $tenantName }}-virt-admin-extended
          clusterRole: acm-vm-extended:admin
          targetNamespaces:
          - {{ $tenantName }}
          clusterSelection:
            type: placements
            placements:
            - name: placement-managed-clusters
              namespace: policies
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: rbac.open-cluster-management.io/v1beta1
      kind: MulticlusterRoleAssignment
      metadata:
        name: customer-{{ $tenantName }}-virt-operator
        namespace: policies
      spec:
        subject:
          kind: Group
          name: {{ $tenant.operatorGroup }}
        roleAssignments:
        - name: customer-{{ $tenantName }}-virt-operator-kubevirt
          clusterRole: kubevirt.io:edit
          targetNamespaces:
          - {{ $tenantName }}
          clusterSelection:
            type: placements
            placements:
            - name: placement-managed-clusters
              namespace: policies
        - name: customer-{{ $tenantName }}-virt-operator-extended
          clusterRole: acm-vm-extended:view
          targetNamespaces:
          - {{ $tenantName }}
          clusterSelection:
            type: placements
            placements:
            - name: placement-managed-clusters
              namespace: policies
  {{- end }}
