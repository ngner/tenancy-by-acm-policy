object-templates-raw: |
  {{- range $tenant := (lookup "dusty-seahorse.io/v1alpha1" "Tenant" "tenancies" "").items }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: rbac.open-cluster-management.io/v1beta1
      kind: MulticlusterRoleAssignment
      metadata:
        name: {{ $tenant.metadata.name }}-tenant-admin-virt
        namespace: policies
      spec:
        subject:
          kind: Group
          name: {{ $tenant.spec.adminGroup }}
        roleAssignments:
        - name: {{ $tenant.metadata.name }}-tenant-admin-virt-kubevirt
          clusterRole: kubevirt.io:admin
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
        - name: {{ $tenant.metadata.name }}-tenant-admin-virt-extended
          clusterRole: acm-vm-extended:admin
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
        - name: {{ $tenant.metadata.name }}-tenant-admin-namespace
          clusterRole: tenant-ns:admin
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: rbac.open-cluster-management.io/v1beta1
      kind: MulticlusterRoleAssignment
      metadata:
        name: {{ $tenant.metadata.name }}-tenant-user-virt
        namespace: policies
      spec:
        subject:
          kind: Group
          name: {{ $tenant.spec.userGroup }}
        roleAssignments:
        - name: {{ $tenant.metadata.name }}-tenant-user-virt-kubevirt
          clusterRole: kubevirt.io:edit
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
        - name: {{ $tenant.metadata.name }}-tenant-user-virt-extended
          clusterRole: acm-vm-extended:view
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
        - name: {{ $tenant.metadata.name }}-tenant-user-namespace
          clusterRole: tenant-ns:user
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
  {{- if $tenant.spec.viewerGroup }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: rbac.open-cluster-management.io/v1beta1
      kind: MulticlusterRoleAssignment
      metadata:
        name: {{ $tenant.metadata.name }}-tenant-viewer-virt
        namespace: policies
      spec:
        subject:
          kind: Group
          name: {{ $tenant.spec.viewerGroup }}
        roleAssignments:
        - name: {{ $tenant.metadata.name }}-tenant-viewer-virt-kubevirt
          clusterRole: kubevirt.io:view
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
        - name: {{ $tenant.metadata.name }}-tenant-viewer-virt-extended
          clusterRole: acm-vm-extended:view
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
        - name: {{ $tenant.metadata.name }}-tenant-viewer-namespace
          clusterRole: tenant-ns:viewer
          targetNamespaces:
          - {{ $tenant.metadata.name }}
          clusterSelection:
            type: placements
            placements:
            - name: policies-placement-managed-clusters
              namespace: policies
  {{- end }}
  {{- end }}
