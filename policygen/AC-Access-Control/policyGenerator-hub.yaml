---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-hub-tenancy-access-control
placementBindingDefaults:
  name: binding-hub-tenancy-access-control
policyDefaults:
  categories:
    - AC Access Control
  controls:
    - AC-3 Access Enforcement
  namespace: policies
  policySets:
    - tenancy-hub-access-control
  remediationAction: enforce
  severity: high
  standards:
    - NIST SP 800-53
  complianceType: mustonlyhave
  consolidateManifests: false

policies:
  # =========================================================================
  # All tenants — hub RBAC driven by the tenant-registry ConfigMap.
  # To add a tenant, add a key to tenant-registry/tenant-configmap.yaml.
  # The object-templates-raw manifests iterate the ConfigMap at evaluation
  # time and generate ClusterRoleBindings + MulticlusterRoleAssignments
  # for every tenant automatically.
  # =========================================================================
  - name: policy-tenant-hub-rbac
    consolidateManifests: false
    orderManifests: true
    manifests:
      - path: tenant-registry/tenant-configmap.yaml
      - path: acm-finegrained-rbac/hub-fleet-crbs.yaml
      - path: acm-finegrained-rbac/hub-mcra-virt.yaml

policySets:
  - name: tenancy-hub-access-control
    description: Hub-side tenant RBAC and MulticlusterRoleAssignments for managed cluster VM access
    placement:
      placementName: placement-hub-clusters