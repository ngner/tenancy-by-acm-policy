---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-hub-tenancy-access-control
placementBindingDefaults:
  name: binding-hub-tenancy-access-control
policyDefaults:
  categories:
    - AC Access Control
  controls:
    - AC-3 Access Enforcement
  namespace: policies
  policySets:
    - policyset-hub-access-control
  remediationAction: enforce
  severity: high
  standards:
    - NIST SP 800-53
  complianceType: mustonlyhave
  consolidateManifests: false

policies:
  # =========================================================================
  # All tenants — hub RBAC driven by Tenant CRs in the tenancies namespace.
  # To add a tenant, create a Tenant CR. The object-templates-raw manifests
  # iterate all Tenant CRs at evaluation time and generate:
  #   - bridge ConfigMap (consumed by managed-cluster policies)
  #   - ClusterRoleBindings for ACM console access
  #   - MulticlusterRoleAssignments for managed-cluster VM RBAC
  # =========================================================================
  - name: policy-tenant-hub-rbac
    consolidateManifests: false
    orderManifests: true
    manifests:
      - path: acm-finegrained-rbac/hub-fleet-crbs.yaml
      - path: acm-finegrained-rbac/hub-mcra-virt.yaml

policySets:
  - name: policyset-hub-access-control
    description: Hub-side tenant RBAC and MulticlusterRoleAssignments for managed cluster VM access
    placement:
      placementName: policies-placement-hub-clusters