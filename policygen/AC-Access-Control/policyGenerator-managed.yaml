---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-managed-tenancy-access-control
placementBindingDefaults:
  name: binding-managed-tenancy-access-control
policyDefaults:
  categories:
    - AC Access Control
  controls:
    - AC-3 Access Enforcement
  namespace: policies
  policySets:
    - policyset-managed-access-control
  remediationAction: enforce
  severity: high
  standards:
    - NIST SP 800-53
  complianceType: mustonlyhave
  consolidateManifests: false

policies:
  # =========================================================================
  # All tenants — managed cluster RoleBindings driven by Tenant CRs
  # replicated from the hub by policy-tenant-bridge-to-managed-clusters(tenancies namespace).
  # To add a tenant, create a Tenant CR in the tenancies namespace on the hub.
  # =========================================================================
  - name: policy-tenant-managed-rbac
    dependencies:
      - name: policy-tenant-bridge-to-managed-clusters
        namespace: tenancies
        compliance: Compliant
    consolidateManifests: false
    manifests:
      - path: rbac/managed-rolebindings.yaml

policySets:
  - name: policyset-managed-access-control
    description: Managed cluster tenant RoleBindings for namespace access
    placement:
      placementName: policies-placement-managed-clusters
