object-templates-raw: |
  {{- $cm := (lookup "v1" "ConfigMap" "tenancies" "tenant-data") }}
  {{- range $name, $specYaml := $cm.data }}
  {{- $tenant := $specYaml | fromYaml }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: customer-{{ $name }}-admin
        namespace: {{ $name }}
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: admin
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: {{ $tenant.adminGroup }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: customer-{{ $name }}-operators
        namespace: {{ $name }}
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: edit
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: {{ $tenant.operatorGroup }}
  {{- end }}
