rules:
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
      - configmaps
      - services
      - pods
      - pods/log
      - events
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources:
      - resourcequotas
      - limitranges
    verbs: [get, list, watch]
  - apiGroups: [cdi.kubevirt.io]
    resources:
      - datavolumes
      - datasources
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-ns:viewer
rules:
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
      - configmaps
      - services
      - pods
      - events
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources:
      - resourcequotas
      - limitranges
    verbs: [get, list, watch]
  - apiGroups: [cdi.kubevirt.io]
    resources:
      - datavolumes
      - datasources
    verbs: [get, list, watch]
